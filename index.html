<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Puntos Gasolinera DONHÉCTOR</title>
  
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "aaec0c39-db80-4072-9e50-88208168eb53",
      });
    });

    // RECEPTOR REPARADO: Escucha cuando el cliente presiona el botón dentro de la Web App de Google
    window.addEventListener("message", function(event) {
      // CORRECCIÓN: Validamos que provenga de los servidores oficiales de ejecución o contenido de Google
      var esOrigenGoogle = event.origin.includes("script.google.com") || event.origin.includes("googleusercontent.com");
      if (!esOrigenGoogle) return;
      
      // Si el mensaje recibido es la orden de vinculación con el DNI
      if (event.data && event.data.tipo === "VINCULAR_ONESIGNAL") {
        var dniCliente = event.data.dni;
        
        // Le ordenamos a OneSignal amarrar este navegador/celular con el DNI del cliente real
        window.OneSignalDeferred.push(async function(OneSignal) {
          await OneSignal.login(dniCliente);
          console.log("Dispositivo vinculado con éxito al DNI en OneSignal: " + dniCliente);
        });
      }
    }, false);
  </script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #CB0020; /* El rojo de tu marca para que no parpadee en blanco */
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <iframe src="https://script.google.com/macros/s/AKfycbzixnsY1ANVEUaS1yjy2WEQBDh0ti1WfYqemmZsjIcKQW4RVVrB9B-FKGRPw9ZZqK2Qsg/exec"></iframe>

</body>
</html>
